[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

markers =
    llm: LLM Tests
    rag: RAG Tests
    agent: Agent Tests
    api: API Tests
    ui: UI Tests
    safety: Safety Tests
    performance: Performance Tests
    smoke: Smoke Tests
    regression: Regression Tests

addopts = -ra -q
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s - %(levelname)s - %(message)s
xfail_strict = true
